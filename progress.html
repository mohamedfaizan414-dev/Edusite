<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>EduQuest - Progress</title>
  <style>
    body {
      margin: 0;
      font-family: "Poppins", sans-serif;
      background: #121212;
      color: #fff;
      text-align: center;
    }

    header {
      background: #1e1e1e;
      padding: 15px;
      font-size: 24px;
      font-weight: bold;
      color: #00c6ff;
      box-shadow: 0 2px 5px rgba(0,0,0,0.6);
    }

    .container {
      width: 80%;
      margin: 40px auto;
    }

    .subject-progress {
      margin: 30px 0;
      text-align: left;
    }

    .subject-progress h3 {
      margin-bottom: 10px;
      color: #ccc;
    }

    .progress-bar {
      background: #333;
      border-radius: 20px;
      overflow: hidden;
      height: 25px;
      width: 100%;
    }

    .progress-fill {
      height: 100%;
      width: 0%;
      text-align: right;
      padding-right: 10px;
      box-sizing: border-box;
      font-size: 14px;
      font-weight: bold;
      color: #000;
      border-radius: 20px;
      transition: width 2s ease-in-out;
    }

    .math { background: #ff9800; }
    .science { background: #4caf50; }
    .history { background: #2196f3; }
    .english { background: #e91e63; }

    .back-btn {
      margin-top: 40px;
      background: #00c6ff;
      color: #000;
      padding: 12px 25px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
      font-size: 16px;
      transition: 0.3s;
    }

    .back-btn:hover {
      background: #009acd;
    }
  </style>
</head>
<body>
  <header>📈 Your Progress</header>

  <div class="container">
    <div class="subject-progress">
      <h3>Mathematics</h3>
      <div class="progress-bar">
        <div class="progress-fill math" id="mathProgress">0%</div>
      </div>
    </div>

    <div class="subject-progress">
      <h3>Science</h3>
      <div class="progress-bar">
        <div class="progress-fill science" id="scienceProgress">0%</div>
      </div>
    </div>

    <div class="subject-progress">
      <h3>History</h3>
      <div class="progress-bar">
        <div class="progress-fill history" id="historyProgress">0%</div>
      </div>
    </div>

    <div class="subject-progress">
      <h3>English</h3>
      <div class="progress-bar">
        <div class="progress-fill english" id="englishProgress">0%</div>
      </div>
    </div>

    <button class="back-btn" onclick="window.location.href='main.html'">⬅ Back to Main</button>
  </div>

  <script>
    // Example progress values (can be updated dynamically)
    const progressData = JSON.parse(localStorage.getItem("eduquestProgress")) || {
      math: 70,
      science: 45,
      history: 60,
      english: 80
    };

    function animateProgress(id, value) {
      const bar = document.getElementById(id);
      bar.style.width = value + "%";
      bar.innerText = value + "%";
    }

    window.onload = () => {
      animateProgress("mathProgress", progressData.math);
      animateProgress("scienceProgress", progressData.science);
      animateProgress("historyProgress", progressData.history);
      animateProgress("englishProgress", progressData.english);
      const progressData = JSON.parse(localStorage.getItem("eduquestProgress")) || {
  math: 70,
  science: 45,
  history: 60,
  english: 80
};
    };
  </script>
</body>
</html>
