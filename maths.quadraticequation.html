<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>EduQuest Quadratic Equation Game</title>
  <style>
    body { font-family:"Poppins",sans-serif; background:linear-gradient(135deg,#0a0f1e,#0a0f1e); color:white; text-align:center; padding:40px; }
    #game-box,#result-box { background:rgba(255,255,255,0.08); border-radius:20px; padding:30px; max-width:650px; margin:auto; box-shadow:0 0 30px rgba(0,198,255,0.3); transition:transform 0.3s ease; }
    h1 { color:#00c6ff; text-shadow:0 0 20px #00c6ff; }
    #question { font-size:1.9rem; margin:25px 0; font-weight:600; }
    #answer { padding:12px; font-size:1.2rem; border-radius:10px; border:none; outline:none; width:60%; margin-top:10px; text-align:center; }
    button { padding:12px 28px; margin-top:20px; font-size:1.05rem; border:none; border-radius:10px; cursor:pointer; background:#00c6ff; color:black; font-weight:bold; transition:0.3s; }
    button:hover { background:#0077ff; color:white; }
    #timer { font-size:1.2rem; margin-top:15px; color:#00ffcc; }
    #level,#progress { font-size:1rem; margin-top:10px; }
    .shake { animation: shake 0.4s; }
    @keyframes shake { 0%{transform:translateX(0);}25%{transform:translateX(-10px);}50%{transform:translateX(10px);}75%{transform:translateX(-10px);}100%{transform:translateX(0);} }
    #result-box { display:none; animation: fadeIn 0.7s ease forwards; }
    @keyframes fadeIn { from{opacity:0; transform:translateY(20px);} to{opacity:1; transform:translateY(0);} }
    .stat { font-size:1.3rem; margin:15px 0; }
  </style>
</head>
<body>
<h1>🎓 Quadratic Equation Challenge 🎮</h1>

<div id="game-box">
  <div id="level">Level: 1</div>
  <div id="progress">Question 0 / 10</div>
  <div id="question">Press Start to Begin!</div>
  <input type="number" id="answer" placeholder="Type one root..." disabled><br>
  <button id="submit" disabled>Submit</button>
  <div id="timer"></div>
  <button id="start">Start Game</button>
</div>

<div id="result-box">
  <h2>🏆 Game Over!</h2>
  <div class="stat" id="final-score"></div>
  <div class="stat" id="final-accuracy"></div>
  <div class="stat" id="final-level"></div>
  <button onclick="restartGame()">Play Again 🔄</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
<script>
const qEl=document.getElementById("question"), aEl=document.getElementById("answer"), sBtn=document.getElementById("submit"), stBtn=document.getElementById("start");
const lvlEl=document.getElementById("level"), tEl=document.getElementById("timer"), pEl=document.getElementById("progress");
const gBox=document.getElementById("game-box"), rBox=document.getElementById("result-box");
const fScore=document.getElementById("final-score"), fAcc=document.getElementById("final-accuracy"), fLvl=document.getElementById("final-level");

let curAns, timer, timeLeft, level=1, score=0, total=0, correct=0;

function generateQuestion(){
  // Generate quadratic with integer roots
  let x1=Math.floor(Math.random()*10)+1;
  let x2=Math.floor(Math.random()*10)+1;
  let a=1, b=-(x1+x2), c=x1*x2;
  curAns=x1; // user solves for one root
  total++;
  qEl.textContent=`Solve: ${a}x² ${b>=0?'+':'-'} ${Math.abs(b)}x ${c>=0?'+':'-'} ${Math.abs(c)} = 0 (Enter one root)`;
  pEl.textContent=`Question ${total} / 10`;
}

function startTimer(){timeLeft=60; tEl.textContent=`⏳ Time left: ${timeLeft}s`;
timer=setInterval(()=>{timeLeft--; tEl.textContent=`⏳ Time left: ${timeLeft}s`; if(timeLeft<=0){clearInterval(timer); nextQuestion(false);}},1000);}

function nextQuestion(isCorrect){clearInterval(timer);
if(isCorrect){correct++; score+=10; if(correct%3===0) level++; confetti({particleCount:80,spread:70,origin:{y:0.6}});}
else{gBox.classList.add("shake"); setTimeout(()=>gBox.classList.remove("shake"),400);}
if(total>=10) endGame(); else { lvlEl.textContent=`Level: ${level}`; generateQuestion(); aEl.value=""; startTimer(); }
}

function endGame(){ gBox.style.display="none"; rBox.style.display="block";
fScore.textContent=`⭐ Score: ${score}`; fAcc.textContent=`🎯 Accuracy: ${((correct/total)*100).toFixed(1)}%`; fLvl.textContent=`📈 Highest Level: ${level}`;
confetti({particleCount:200,spread:100,origin:{y:0.6}}); }

function restartGame(){score=0;level=1;total=0;correct=0;rBox.style.display="none";gBox.style.display="block";
stBtn.disabled=true;sBtn.disabled=false;aEl.disabled=false;lvlEl.textContent=`Level: ${level}`;pEl.textContent=`Question 0 / 10`;
generateQuestion();startTimer();}

sBtn.addEventListener("click",()=>{let val=parseFloat(aEl.value); if(!isNaN(val)&&val===curAns) nextQuestion(true); else nextQuestion(false);});
stBtn.addEventListener("click",()=>{score=0;level=1;total=0;correct=0;stBtn.disabled=true;sBtn.disabled=false;aEl.disabled=false;generateQuestion();startTimer();});
// Award points after quiz completion
let user = JSON.parse(localStorage.getItem("eduquestUser")) || { points: 0 };
user.points = (user.points || 0) + 10; // Add 10 points for winning
localStorage.setItem("eduquestUser", JSON.stringify(user));
</script>
</body>
</html>
